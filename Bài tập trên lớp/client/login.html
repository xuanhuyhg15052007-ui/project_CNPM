<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — Spotify Clone</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body data-page="login">
    <div class="auth-page">
      <div class="auth-card">
        <!-- Logo -->
        <a href="#" class="auth-logo">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 0 1-.857.208c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 1 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115.294.18.387.563.207.856zm1.223-2.722a.78.78 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 0 1-.973-.519.781.781 0 0 1 .519-.972c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 0 1 .257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 1 1-.543-1.792c3.532-1.072 9.404-.865 13.115 1.338a.937.937 0 0 1-.955 1.611z"
            />
          </svg>
          <span class="auth-logo-text">Spotify</span>
        </a>

        <h1 class="auth-heading">Đăng nhập vào Spotify</h1>
        <p class="auth-subheading">
          Chào mừng trở lại. Vui lòng nhập thông tin đăng nhập.
        </p>

        <!-- Form -->
        <form class="auth-form" id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-email"
              >Email hoặc tên đăng nhập</label
            >
            <div class="form-input-wrapper">
              <input
                class="form-input"
                type="text"
                id="login-email"
                placeholder="spotify hoặc ten@email.com"
                autocomplete="username"
                required
              />
            </div>
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Mật khẩu</label>
            <div class="form-input-wrapper">
              <input
                class="form-input has-icon"
                type="password"
                id="login-password"
                placeholder="Nhập mật khẩu"
                autocomplete="current-password"
                required
              />
              <span
                class="form-input-icon"
                id="toggle-password"
                title="Hiện/ẩn mật khẩu"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  width="18"
                  height="18"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
            <span class="form-error" id="password-error"></span>
          </div>

          <a href="#" class="auth-forgot">Quên mật khẩu?</a>

          <button class="btn-auth-primary" type="submit" id="login-submit">
            Đăng nhập
          </button>
        </form>

        <div class="auth-divider"><span>hoặc</span></div>

        <!-- OAuth -->
        <div style="display: flex; flex-direction: column; gap: 12px">
          <button class="btn-oauth">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Tiếp tục với Google
          </button>
        </div>

        <div class="auth-footer">
          Chưa có tài khoản?
          <a href="register.html">Đăng ký Spotify</a>
        </div>
      </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/admin-login.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
