<!-- Home -->
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body data-page="home">
    <!-- ============================================
     APP LAYOUT
     ============================================ -->
    <div class="app-layout">
      <!-- ==================== SIDEBAR ==================== -->
      <aside class="sidebar">
        <!-- Logo -->
        <a href="index.html" class="sidebar-logo">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 0 1-.857.208c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 1 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115.294.18.387.563.207.856zm1.223-2.722a.78.78 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 0 1-.973-.519.781.781 0 0 1 .519-.972c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 0 1 .257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 1 1-.543-1.792c3.532-1.072 9.404-.865 13.115 1.338a.937.937 0 0 1-.955 1.611z"
            />
          </svg>
          <span class="sidebar-logo-text">Spotify</span>
        </a>

        <!-- Navigation -->
        <nav class="sidebar-nav">
          <a href="index.html" class="sidebar-nav-item active" id="nav-home">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            Trang chủ
          </a>
          <a href="search.html" class="sidebar-nav-item" id="nav-search">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="22"
              height="22"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            Tìm kiếm
          </a>
        </nav>

        <!-- Library -->
        <div class="sidebar-library">
          <div class="sidebar-library-header">
            <div class="sidebar-library-title">
              <svg
                viewBox="0 0 24 24"
                fill="currentColor"
                width="20"
                height="20"
              >
                <path
                  d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5a2.5 2.5 0 0 1-5 0 2.5 2.5 0 0 1 2.5-2.5c.57 0 1.08.19 1.5.5V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"
                />
              </svg>
              Thư viện của bạn
            </div>
            <div class="sidebar-library-actions">
              <button
                class="btn-icon-sm"
                title="Tạo playlist mới"
                data-action="create-playlist"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  width="16"
                  height="16"
                >
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Playlist list -->
          <div class="sidebar-playlist-list" id="sidebar-playlist-list">
            <!-- Điền bởi playlist.js -->
            <div
              style="
                padding: 12px;
                font-size: 13px;
                color: var(--color-text-muted);
              "
            >
              Đang tải...
            </div>
          </div>

          <!-- Create playlist card -->
          <div class="sidebar-create-card">
            <h4>Tạo danh sách phát đầu tiên</h4>
            <p>Tập hợp những bài hát bạn yêu thích vào một nơi.</p>
            <button class="btn-create-playlist" data-action="create-playlist">
              Tạo playlist
            </button>
          </div>
        </div>
      </aside>

      <!-- ==================== MAIN CONTENT ==================== -->
      <main class="main-content">
        <!-- Topbar -->
        <header class="topbar" id="topbar">
          <!-- Nav arrows -->
          <div class="topbar-nav">
            <button
              class="btn-nav"
              id="btn-back"
              title="Quay lại"
              onclick="history.back()"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                width="16"
                height="16"
              >
                <polyline points="15 18 9 12 15 6" />
              </svg>
            </button>
            <button
              class="btn-nav"
              id="btn-forward"
              title="Tiến"
              onclick="history.forward()"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                width="16"
                height="16"
              >
                <polyline points="9 18 15 12 9 6" />
              </svg>
            </button>
          </div>

          <!-- Search -->
          <div class="search-bar">
            <svg
              class="search-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              class="search-input"
              type="text"
              placeholder="Tìm bài hát, nghệ sĩ..."
              id="search-input"
              autocomplete="off"
            />
            <div class="search-results-dropdown" id="search-dropdown">
              <!-- Điền bởi search.js -->
            </div>
          </div>

          <!-- User menu -->
          <div class="topbar-user">
            <div class="user-menu-btn" id="user-menu-btn">
              <div class="user-avatar" id="user-avatar">
                <!-- Chữ viết tắt tên người dùng -->
              </div>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                width="16"
                height="16"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>

            <!-- Dropdown menu -->
            <div class="user-dropdown" id="user-dropdown">
              <div class="user-dropdown-item" id="menu-profile">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  width="18"
                  height="18"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                Hồ sơ
              </div>
              <div class="user-dropdown-item">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  width="18"
                  height="18"
                >
                  <circle cx="12" cy="12" r="3" />
                  <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                  />
                </svg>
                Cài đặt
              </div>
              <div class="user-dropdown-divider"></div>
              <div
                class="user-dropdown-item"
                id="menu-logout"
                onclick="Auth.logout()"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  width="18"
                  height="18"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Đăng xuất
              </div>
            </div>
          </div>
        </header>

        <!-- Content area -->
        <div class="content-area" id="content-area"></div>
        <!-- end content-area -->
      </main>

      <!-- ==================== PLAYER BAR ==================== -->
      <footer class="player-bar" id="player-bar">
        <!-- Left: Now playing -->
        <div class="player-now-playing">
          <div class="player-thumb" id="player-thumb">
            <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
              <path d="M9 3v10.55A4 4 0 1 0 11 17V7h4V3H9z" />
            </svg>
          </div>
          <div class="player-track-info">
            <div class="player-track-name" id="player-track-name">—</div>
            <div class="player-track-artist" id="player-track-artist">
              Chọn bài để phát
            </div>
          </div>
          <button
            class="btn-like"
            id="btn-like"
            title="Thêm vào bài hát đã thích"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="16"
              height="16"
            >
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              />
            </svg>
          </button>
        </div>

        <!-- Center: Controls -->
        <div class="player-controls">
          <div class="player-buttons">
            <!-- Shuffle -->
            <button class="btn-player" id="btn-shuffle" title="Phát ngẫu nhiên">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                width="18"
                height="18"
              >
                <polyline points="16 3 21 3 21 8" />
                <line x1="4" y1="20" x2="21" y2="3" />
                <polyline points="21 16 21 21 16 21" />
                <line x1="15" y1="15" x2="21" y2="21" />
              </svg>
            </button>

            <!-- Previous -->
            <button class="btn-player" id="btn-prev" title="Bài trước (Ctrl+←)">
              <svg
                viewBox="0 0 24 24"
                fill="currentColor"
                width="18"
                height="18"
              >
                <polygon points="19 20 9 12 19 4" />
                <line
                  x1="5"
                  y1="19"
                  x2="5"
                  y2="5"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>

            <!-- Play/Pause -->
            <button
              class="btn-play-main"
              id="btn-play"
              title="Phát/Dừng (Space)"
            >
              <svg
                viewBox="0 0 24 24"
                fill="currentColor"
                width="20"
                height="20"
              >
                <polygon points="5,3 19,12 5,21" />
              </svg>
            </button>

            <!-- Next -->
            <button class="btn-player" id="btn-next" title="Bài tiếp (Ctrl+→)">
              <svg
                viewBox="0 0 24 24"
                fill="currentColor"
                width="18"
                height="18"
              >
                <polygon points="5 4 15 12 5 20" />
                <line
                  x1="19"
                  y1="5"
                  x2="19"
                  y2="19"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>

            <!-- Repeat -->
            <button class="btn-player" id="btn-repeat" title="Lặp lại">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                width="18"
                height="18"
              >
                <polyline points="17 1 21 5 17 9" />
                <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                <polyline points="7 23 3 19 7 15" />
                <path d="M21 13v2a4 4 0 0 1-4 4H3" />
              </svg>
            </button>
          </div>

          <!-- Progress -->
          <div class="player-progress">
            <span class="progress-time" id="current-time">0:00</span>
            <div class="progress-bar-track" id="progress-track">
              <div
                class="progress-bar-fill"
                id="progress-fill"
                style="width: 0%"
              >
                <div class="progress-bar-handle" id="progress-handle"></div>
              </div>
            </div>
            <span class="progress-time" id="total-time">0:00</span>
          </div>
        </div>

        <!-- Right: Volume & extras -->
        <div class="player-extras">
          <!-- Visualizer -->
          <div class="player-visualizer" id="player-visualizer">
            <div
              class="visualizer-bar"
              style="--min-h: 3px; --max-h: 14px; --dur: 0.7s; height: 8px"
            ></div>
            <div
              class="visualizer-bar"
              style="--min-h: 5px; --max-h: 20px; --dur: 0.9s; height: 12px"
            ></div>
            <div
              class="visualizer-bar"
              style="--min-h: 4px; --max-h: 16px; --dur: 0.6s; height: 10px"
            ></div>
            <div
              class="visualizer-bar"
              style="--min-h: 3px; --max-h: 18px; --dur: 1.1s; height: 7px"
            ></div>
            <div
              class="visualizer-bar"
              style="--min-h: 6px; --max-h: 14px; --dur: 0.8s; height: 14px"
            ></div>
          </div>

          <!-- Queue -->
          <button class="btn-player" title="Hàng chờ">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="16"
              height="16"
            >
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
          </button>

          <!-- Mute -->
          <div class="volume-control">
            <button class="btn-player" id="btn-mute" title="Tắt/bật âm (M)">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                width="16"
                height="16"
              >
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
              </svg>
            </button>
            <input
              type="range"
              class="volume-slider"
              id="volume-slider"
              min="0"
              max="1"
              step="0.01"
              value="0.7"
            />
          </div>
        </div>
      </footer>
    </div>
    <!-- end app-layout -->

    <!-- ==================== PLAYLIST MODAL ==================== -->
    <div class="modal-overlay" id="playlist-modal">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">Tạo playlist mới</h2>
          <button class="modal-close">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              width="20"
              height="20"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <form id="create-playlist-form">
          <div class="form-group" style="margin-bottom: 16px">
            <label class="form-label" for="playlist-name">Tên playlist</label>
            <input
              class="form-input"
              type="text"
              id="playlist-name"
              placeholder="Playlist của tôi"
              maxlength="100"
              required
            />
          </div>
          <div class="form-group" style="margin-bottom: 24px">
            <label class="form-label" for="playlist-desc"
              >Mô tả (tuỳ chọn)</label
            >
            <input
              class="form-input"
              type="text"
              id="playlist-desc"
              placeholder="Thêm mô tả cho playlist..."
              maxlength="300"
            />
          </div>
          <button
            type="submit"
            id="playlist-submit"
            style="
              width: 100%;
              padding: 14px;
              background: var(--color-accent);
              color: #000;
              font-size: 15px;
              font-weight: 700;
              border-radius: var(--radius-full);
              cursor: pointer;
              transition:
                background 0.15s,
                transform 0.15s;
              border: none;
            "
            onmouseover="
              this.style.background = 'var(--color-accent-hover)';
              this.style.transform = 'scale(1.02)';
            "
            onmouseout="
              this.style.background = 'var(--color-accent)';
              this.style.transform = 'scale(1)';
            "
          >
            Tạo
          </button>
        </form>
      </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/player.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/playlist.js"></script>

    <script>
      // ============================================
      // index.js inline — Logic trang chủ
      // ============================================
      document.addEventListener("DOMContentLoaded", async () => {
        // Kiểm tra đăng nhập
        if (!Auth.requireAuth()) return;

        const user = Auth.getCurrentUser();

        // ---- User avatar & tên ----
        const avatarEl = document.getElementById("user-avatar");
        if (avatarEl && user) {
          if (user.avatar) {
            avatarEl.innerHTML = `<img src="${user.avatar}" alt="${user.name}" style="width:100%;height:100%;object-fit:cover">`;
          } else {
            avatarEl.textContent = (user.name || "U").charAt(0).toUpperCase();
          }
        }

        // ---- Greeting theo giờ ----
        const hour = new Date().getHours();
        const greetingEl = document.getElementById("greeting-text");
        if (greetingEl) {
          greetingEl.textContent =
            hour < 12
              ? "Chào buổi sáng"
              : hour < 18
                ? "Chào buổi chiều"
                : "Chào buổi tối";
        }

        // ---- User dropdown ----
        const menuBtn = document.getElementById("user-menu-btn");
        const dropdown = document.getElementById("user-dropdown");
        menuBtn?.addEventListener("click", (e) => {
          e.stopPropagation();
          dropdown?.classList.toggle("open");
        });
        document.addEventListener("click", () =>
          dropdown?.classList.remove("open"),
        );

        // ---- Load trending songs ----
        await loadTrendingSongs();
        await loadRecentPlaylists(
          document
            .getElementById("search-input")
            ?.addEventListener("keydown", (e) => {
              if (e.key === "Enter") {
                const query = e.target.value.trim();
                window.location.href = query
                  ? `search.html?q=${encodeURIComponent(query)}`
                  : "search.html";
              }
            }),
        );
      });

      async function loadTrendingSongs() {
        const grid = document.getElementById("trending-grid");
        if (!grid) return;

        try {
          const data = await window.API.songs.getTrending();
          const songs = data.songs || data || [];

          if (songs.length === 0) {
            grid.innerHTML = `<div style="font-size:14px;color:var(--color-text-muted);grid-column:1/-1">
        Chưa có bài hát nào.
      </div>`;
            return;
          }

          grid.innerHTML = songs
            .slice(0, 5)
            .map(
              (song, i) => `
      <div class="music-card" ondblclick="window.Player.loadSong(${JSON.stringify(JSON.stringify(song)).slice(1, -1)}, null, 0)"
           onclick="">
        <div class="music-card-thumb-wrap">
          <div class="music-card-thumb" style="background:${randomGradient(i)}">
            ${
              song.coverUrl
                ? `<img src="${song.coverUrl}" alt="${escHtml(song.title)}" style="width:100%;height:100%;object-fit:cover">`
                : `<svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.3)" width="40" height="40">
                   <path d="M9 3v10.55A4 4 0 1 0 11 17V7h4V3H9z"/>
                 </svg>`
            }
          </div>
          <button class="music-card-play-btn"
                  onclick="event.stopPropagation();playSong(${i},'trending')">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </button>
        </div>
        <div class="music-card-title">${escHtml(song.title)}</div>
        <div class="music-card-sub">${escHtml(song.artist || "")}</div>
      </div>`,
            )
            .join("");

          // Quick grid
          updateQuickGrid(songs.slice(0, 6));

          window._trendingSongs = songs;
        } catch {
          grid.innerHTML = `<div style="font-size:14px;color:var(--color-text-muted);grid-column:1/-1">
      Không thể tải bài hát. Kiểm tra kết nối server.
    </div>`;
        }
      }

      async function loadRecentPlaylists() {
        const grid = document.getElementById("recent-grid");
        if (!grid) return;

        try {
          const data = await window.API.playlists.getMyPlaylists();
          const playlists = data.playlists || data || [];

          if (playlists.length === 0) {
            grid.innerHTML = `<div style="font-size:14px;color:var(--color-text-muted);grid-column:1/-1">
        Bạn chưa có playlist nào.
        <span style="cursor:pointer;text-decoration:underline;color:var(--color-text-secondary)"
              onclick="document.querySelector('[data-action=create-playlist]').click()">
          Tạo ngay!
        </span>
      </div>`;
            return;
          }

          grid.innerHTML = playlists
            .slice(0, 5)
            .map(
              (pl, i) => `
      <div class="music-card"
           onclick="PlaylistManager.openPlaylist('${pl._id}')">
        <div class="music-card-thumb-wrap">
          <div class="music-card-thumb" style="background:${randomGradient(i + 3)}">
            ${
              pl.coverUrl
                ? `<img src="${pl.coverUrl}" alt="${escHtml(pl.name)}" style="width:100%;height:100%;object-fit:cover">`
                : `<svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.3)" width="40" height="40">
                   <path d="M9 3v10.55A4 4 0 1 0 11 17V7h4V3H9z"/>
                 </svg>`
            }
          </div>
          <button class="music-card-play-btn"
                  onclick="event.stopPropagation();PlaylistManager.playAll('${pl._id}')">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </button>
        </div>
        <div class="music-card-title">${escHtml(pl.name)}</div>
        <div class="music-card-sub">${pl.songs?.length || 0} bài hát</div>
      </div>`,
            )
            .join("");
        } catch {
          grid.innerHTML = `<div style="font-size:14px;color:var(--color-text-muted);grid-column:1/-1">
      Không thể tải playlist.
    </div>`;
        }
      }

      function updateQuickGrid(songs) {
        const grid = document.getElementById("quick-grid");
        if (!grid || !songs?.length) return;

        grid.innerHTML = songs
          .map(
            (song, i) => `
    <div class="quick-item" onclick="window.Player?.loadSong(window._trendingSongs[${i}], window._trendingSongs, ${i})">
      <div class="quick-item-thumb" style="background:${randomGradient(i)}">
        ${
          song.coverUrl
            ? `<img src="${song.coverUrl}" alt="${escHtml(song.title)}" style="width:100%;height:100%;object-fit:cover">`
            : `<svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.4)" width="24" height="24">
               <path d="M9 3v10.55A4 4 0 1 0 11 17V7h4V3H9z"/>
             </svg>`
        }
      </div>
      <span class="quick-item-name">${escHtml(song.title)}</span>
      <div class="quick-item-play">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </div>
    </div>`,
          )
          .join("");
      }

      function playSong(index, source) {
        const songs = source === "trending" ? window._trendingSongs || [] : [];
        if (!songs[index]) return;
        window.Player?.loadSong(songs[index], songs, index);
      }

      // Gradient backgrounds cho cards (không cần ảnh)
      const GRADIENTS = [
        "linear-gradient(135deg,#1DB954,#158A3E)",
        "linear-gradient(135deg,#E91429,#A00D1B)",
        "linear-gradient(135deg,#2D46B9,#1A2A6C)",
        "linear-gradient(135deg,#F59B23,#B06A00)",
        "linear-gradient(135deg,#8D67AB,#5C3D7A)",
        "linear-gradient(135deg,#0D73EC,#0050A0)",
        "linear-gradient(135deg,#E8115B,#A00040)",
      ];
      function randomGradient(i) {
        return GRADIENTS[i % GRADIENTS.length];
      }

      function escHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
