      <main class="dashboard-panel">
        <header class="topbar">
          <div>
            <h1>Notifications</h1>
            <p>Yêu cầu đăng nhạc từ ca sĩ cần phê duyệt.</p>
          </div>
          <div class="user-profile">Admin</div>
        </header>

        <section class="section split-section">
          <div class="panel panel-table" style="padding: 16px">
            <div class="panel-header">
              <h3>Pending Requests</h3>
            </div>
            <div>
              <ul
                id="requests-list"
                class="requests-list"
                style="
                  margin: 0;
                  padding: 0;
                  list-style: none;
                  display: grid;
                  gap: 8px;
                "
              >
                <!-- items rendered by JS -->
              </ul>
            </div>
          </div>

          <div
            class="panel panel-large"
            id="request-detail"
            style="padding: 20px"
          >
            <h3>Detail</h3>
            <div id="no-selection">
              Chọn một yêu cầu ở bên trái để xem chi tiết.
            </div>
            <div id="detail-card" style="display: none">
              <p><strong>Artist:</strong> <span id="detail-artist"></span></p>
              <p><strong>Song:</strong> <span id="detail-title"></span></p>
              <p>
                <strong>Link:</strong>
                <a id="detail-link" href="#" target="_blank">Open</a>
              </p>
              <div class="modal-actions" style="margin-top: 16px">
                <button id="detail-accept" class="btn-accept">Accept</button>
                <button id="detail-decline" class="btn-decline">Decline</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      // Initial demo requests (replace with server data when available)
      const initialRequests = [
        { id: "1", artist: "Jack", title: "Hoa hải đường", link: "#" },
        {
          id: "2",
          artist: "Sơn Tùng",
          title: "Muộn rồi mà sao còn",
          link: "#",
        },
        { id: "3", artist: "Đen Vâu", title: "Đưa nhau đi trốn", link: "#" },
      ];

      const listEl = document.getElementById("requests-list");
      const detailCard = document.getElementById("detail-card");
      const noSelection = document.getElementById("no-selection");
      const detailArtist = document.getElementById("detail-artist");
      const detailTitle = document.getElementById("detail-title");
      const detailLink = document.getElementById("detail-link");
      const detailAccept = document.getElementById("detail-accept");
      const detailDecline = document.getElementById("detail-decline");

      let activeId = null;

      function renderList() {
        listEl.innerHTML = "";
        const items = initialRequests;
        if (!items.length) {
          listEl.innerHTML =
            '<li style="color:var(--muted)">Không có yêu cầu nào.</li>';
          // clear detail
          activeId = null;
          hideDetail();
          return;
        }
        items.forEach((r) => {
          const li = document.createElement("li");
          li.dataset.id = r.id;
          li.dataset.artist = r.artist;
          li.dataset.title = r.title;
          li.dataset.link = r.link;
          li.style.padding = "10px";
          li.style.borderRadius = "12px";
          li.style.cursor = "pointer";
          li.style.display = "flex";
          li.style.justifyContent = "flex-start";
          li.style.alignItems = "center";
          li.style.gap = "12px";
          li.style.background = "rgba(255,255,255,0.02)";

          const left = document.createElement("div");
          left.innerHTML =
            "<strong>" +
            escapeHtml(r.artist) +
            '</strong><div style="color:var(--muted);font-size:0.95rem">' +
            escapeHtml(r.title) +
            "</div>";

          li.appendChild(left);

          // click on li -> show detail
          li.addEventListener("click", function () {
            showDetailFor(r.id);
          });

          listEl.appendChild(li);
        });
      }

      function showDetailFor(id) {
        const row = listEl.querySelector('li[data-id="' + id + '"]');
        if (!row) return;
        activeId = id;
        detailArtist.textContent = row.dataset.artist;
        detailTitle.textContent = row.dataset.title;
        detailLink.href = row.dataset.link || "#";
        noSelection.style.display = "none";
        detailCard.style.display = "block";
      }

      function hideDetail() {
        noSelection.style.display = "block";
        detailCard.style.display = "none";
      }

      function acceptRequest(id) {
        // remove from UI
        const row = listEl.querySelector('li[data-id="' + id + '"]');
        if (row) row.remove();
        if (activeId === id) {
          activeId = null;
          hideDetail();
        }
      }

      function declineRequest(id) {
        const row = listEl.querySelector('li[data-id="' + id + '"]');
        if (row) row.remove();
        if (activeId === id) {
          activeId = null;
          hideDetail();
        }
      }

      // modal-like detail accept/decline
      detailAccept.addEventListener("click", function () {
        if (activeId) acceptRequest(activeId);
      });
      detailDecline.addEventListener("click", function () {
        if (activeId) declineRequest(activeId);
      });

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // initial render
      renderList();
    </script>
