<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng xuất</title>
    <link rel="stylesheet" href="../assets/css/logout.css" />
  </head>
  <body>
    <div class="card">
      <h1>Bạn có chắc chắn muốn đăng xuất?</h1>
      <div class="actions">
        <button class="btn btn-primary" onclick="handleLogout()">
          Đăng xuất
        </button>
        <button class="btn btn-secondary" onclick="handleCancel()">Hủy</button>
      </div>
    </div>

    <script>
      function handleLogout() {
        localStorage.clear();
        window.location.href = "../client/login.html";
      }
      function handleCancel() {
        window.location.href = "./Admin-spotify/html/login.html";
      }
    </script>
  </body>
</html>
