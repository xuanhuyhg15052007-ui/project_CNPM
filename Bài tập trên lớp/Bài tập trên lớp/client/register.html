<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký — Spotify Clone</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body data-page="register">
    <div class="auth-page">
      <div class="auth-card">
        <!-- Logo -->
        <a href="login.html" class="auth-logo">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 0 1-.857.208c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 1 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115.294.18.387.563.207.856zm1.223-2.722a.78.78 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 0 1-.973-.519.781.781 0 0 1 .519-.972c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 0 1 .257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 1 1-.543-1.792c3.532-1.072 9.404-.865 13.115 1.338a.937.937 0 0 1-.955 1.611z"
            />
          </svg>
          <span class="auth-logo-text">Spotify</span>
        </a>

        <h1 class="auth-heading">Tạo tài khoản</h1>
        <p class="auth-subheading">
          Tham gia cùng hàng triệu người yêu âm nhạc.
        </p>

        <!-- Form -->
        <form class="auth-form" id="register-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="register-name">Họ và tên</label>
            <div class="form-input-wrapper">
              <input
                class="form-input"
                type="text"
                id="register-name"
                placeholder="Nguyễn Văn A"
                autocomplete="name"
                required
              />
            </div>
            <span class="form-error" id="name-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="register-email">Email</label>
            <div class="form-input-wrapper">
              <input
                class="form-input"
                type="email"
                id="register-email"
                placeholder="ten@email.com"
                autocomplete="email"
                required
              />
            </div>
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="register-password">Mật khẩu</label>
            <div class="form-input-wrapper">
              <input
                class="form-input has-icon"
                type="password"
                id="register-password"
                placeholder="Tối thiểu 6 ký tự"
                autocomplete="new-password"
                required
              />
              <span
                class="form-input-icon"
                id="toggle-password"
                title="Hiện/ẩn mật khẩu"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  width="18"
                  height="18"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
            <!-- Thanh đánh giá độ mạnh mật khẩu -->
            <div class="password-strength" id="password-strength">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <div class="strength-label" id="strength-label"></div>
            <span class="form-error" id="password-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="register-confirm"
              >Xác nhận mật khẩu</label
            >
            <div class="form-input-wrapper">
              <input
                class="form-input has-icon"
                type="password"
                id="register-confirm"
                placeholder="Nhập lại mật khẩu"
                autocomplete="new-password"
                required
              />
              <span
                class="form-input-icon"
                id="toggle-confirm"
                title="Hiện/ẩn mật khẩu"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  width="18"
                  height="18"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
            <span class="form-error" id="confirm-error"></span>
          </div>

          <button class="btn-auth-primary" type="submit" id="register-submit">
            Tạo tài khoản
          </button>
        </form>

        <p class="register-terms" style="margin-top: 16px">
          Bằng cách tạo tài khoản, bạn đồng ý với
          <a href="#">Điều khoản dịch vụ</a> và
          <a href="#">Chính sách quyền riêng tư</a> của chúng tôi.
        </p>

        <div class="auth-footer">
          Đã có tài khoản?
          <a href="login.html">Đăng nhập</a>
        </div>
      </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
